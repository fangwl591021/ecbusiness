<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SaaS 總管後台</title>
  <style>
    body { font-family: sans-serif; margin: 0; padding: 0; background-color: #f8f9fa; color: #111; display: flex; height: 100vh; }
    .hidden { display: none !important; }
    .sidebar { width: 220px; background: #ffffff; border-right: 1px solid #eeeeee; display: flex; flex-direction: column; }
    .sidebar-header { padding: 24px; font-size: 16px; color: #00B900; }
    .menu-item { padding: 12px 24px; font-size: 14px; cursor: pointer; color: #666; transition: 0.2s; }
    .menu-item:hover { background: #f9f9f9; color: #111; }
    .menu-item.active { color: #00B900; background: #f0fff0; border-right: 3px solid #00B900; }
    .main { flex: 1; overflow-y: auto; padding: 30px; }
    .card { background: #fff; padding: 24px; border-radius: 8px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th { text-align: left; padding: 12px; border-bottom: 1px solid #eeeeee; color: #999; font-weight: normal; }
    td { padding: 14px 12px; border-bottom: 1px solid #f9f9f9; }
    input, select { display: block; width: 100%; margin-bottom: 20px; padding: 10px 0; border: none; border-bottom: 1px solid #eee; font-size: 14px; background: transparent; }
    input:focus { outline: none; border-bottom: 1px solid #00B900; }
    button { background-color: #00B900; color: #fff; border: none; padding: 10px 18px; border-radius: 4px; cursor: pointer; font-size: 13px; }
    .btn-copy { background: #1890ff; padding: 4px 8px; font-size: 11px; }
    .status-active { color: #00B900; }
    .status-binding { color: #faad14; font-weight: bold; }
    #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center; }
    .modal { background: #fff; padding: 24px; border-radius: 8px; width: 300px; text-align: center; }
  </style>
</head>
<body>
  <div class="sidebar">
    <div class="sidebar-header">QQ SaaS Admin</div>
    <div class="menu-item active">商家授權管理</div>
    <div class="menu-item" onclick="window.open('https://docs.google.com/spreadsheets/d/1nsURHsvW-lGLlYQ4VZAEGo_lzi_5IBvekQ1542T3hw8')">查看 Google 報表</div>
  </div>
  <div class="main">
    <div id="login-section" class="card">
      <input type="password" id="admin-key" placeholder="管理密碼">
      <button onclick="login()" style="width:100%">登入系統</button>
    </div>
    <div id="list-section" class="hidden">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px">
        <h3 style="margin:0; font-weight:normal">商家名單</h3>
        <button onclick="preCreate()">＋ 預開帳號</button>
      </div>
      <div class="card">
        <table>
          <thead><tr><th>商家/連結</th><th>狀態</th><th>綁定 UID</th><th>操作</th></tr></thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>
    </div>
    <div id="form-section" class="hidden card">
      <h3 style="margin-top:0; font-weight:normal">設定商家</h3>
      <input type="text" id="t-id" placeholder="商家代號 (英文)">
      <input type="text" id="t-name" placeholder="商家名稱">
      <select id="t-status">
        <option value="pending">pending (初始)</option>
        <option value="binding">binding (待核准)</option>
        <option value="active">active (已開通)</option>
      </select>
      <button onclick="saveTenant()" style="width:100%">儲存設定</button>
      <button onclick="showView('list')" style="background:none; color:#999; width:100%; margin-top:10px">返回清單</button>
    </div>
  </div>
  <div id="overlay"><div class="modal"><div id="modal-msg" style="margin-bottom:20px; font-size:14px"></div><button onclick="closeModal()" style="width:100%">確定</button></div></div>
  <script>
    const API = 'https://ecbusiness.fangwl591021.workers.dev';
    // 總監修正：更新至 ecbusiness 路徑
    const BASE_PAGE = 'https://fangwl591021.github.io/ecbusiness/index.html';
    let adminKey = '';

    function showView(v) { document.getElementById('list-section').classList.toggle('hidden', v!=='list'); document.getElementById('form-section').classList.toggle('hidden', v!=='form'); }
    function closeModal() { document.getElementById('overlay').style.display = 'none'; }

    async function login() {
      adminKey = document.getElementById('admin-key').value;
      await load();
    }

    async function load() {
      const res = await fetch(`${API}/?action=admin_list&adminKey=${encodeURIComponent(adminKey)}`);
      if(res.ok) {
        render(await res.json());
        document.getElementById('login-section').classList.add('hidden');
        showView('list');
      }
    }

    function render(list) {
      const body = document.getElementById('table-body');
      body.innerHTML = '';
      list.forEach(t => {
        // 使用修正後的 BASE_PAGE
        const url = `${BASE_PAGE}?liffId=2009930620-98JTuN5O&tenantId=${t.tenantId}`;
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td><strong>${t.tenantName||t.tenantId}</strong><br><button class="btn-copy" onclick="copy('${url}')">複製連結</button></td>
          <td class="status-${t.status}">${t.status}</td>
          <td><small>${t.adminUserId||'尚未綁定'}</small></td>
          <td>
            ${t.status==='binding'?'<button onclick="approve(\''+t.tenantId+'\')">核准</button>':''}
            <button style="background:#ff4d4f; margin-left:5px" onclick="del(\''+t.tenantId+'\')">×</button>
          </td>
        `;
        body.appendChild(tr);
      });
    }

    async function preCreate() {
      const id = prompt("請輸入商家英文代號:");
      if(id) {
        await fetch(`${API}/?action=admin_save&adminKey=${encodeURIComponent(adminKey)}`, {
          method:'POST',
          body:JSON.stringify({tenantId:id, status:'pending'})
        });
        load();
      }
    }

    async function approve(id) {
      await fetch(`${API}/?action=admin_save&adminKey=${encodeURIComponent(adminKey)}`, {
        method:'POST',
        body:JSON.stringify({tenantId:id, status:'active'})
      });
      load();
    }

    async function del(id) {
      if(confirm('確定刪除該商家授權？')) {
        await fetch(`${API}/?action=admin_delete&adminKey=${encodeURIComponent(adminKey)}`, {
          method:'POST',
          body:JSON.stringify({tenantId:id})
        });
        load();
      }
    }

    function copy(t) {
      const e = document.createElement('textarea');
      e.value = t;
      document.body.appendChild(e);
      e.select();
      document.execCommand('copy');
      document.body.removeChild(e);
      alert('已複製正確的網址到剪貼簿');
    }
  </script>
</body>
</html>
