<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>電子名片系統</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body { font-family: -apple-system, sans-serif; padding: 16px; color: #111111; margin: 0; background-color: #ffffff; }
    .section { display: none; }
    .active { display: block; }
    
    /* LINE OA 原生設計規範：無框線、極簡、灰字標籤 */
    .label { font-size: 13px; color: #999999; margin-bottom: 4px; display: block; }
    input { display: block; width: 100%; margin-bottom: 24px; padding: 12px 0; border: none; border-bottom: 1px solid #eeeeee; font-size: 15px; color: #111111; background: transparent; border-radius: 0; }
    input:focus { outline: none; border-bottom: 1px solid #00B900; }
    
    button { background-color: #00B900; color: #ffffff; border: none; padding: 14px; width: 100%; font-size: 15px; border-radius: 6px; cursor: pointer; transition: 0.2s; -webkit-tap-highlight-color: transparent; }
    button:active { opacity: 0.7; }
    .btn-secondary { background-color: #f5f5f5; color: #111111; margin-top: 12px; }
    
    .header { display: flex; align-items: center; margin-bottom: 24px; }
    .avatar { width: 56px; height: 56px; border-radius: 50%; object-fit: cover; margin-right: 16px; background-color: #f8f8f8; }
    .name-area { flex: 1; }
    .name { font-size: 19px; margin-bottom: 4px; color: #000; font-weight: normal; }
    .sub { font-size: 14px; color: #888; }
    .info-row { font-size: 15px; margin-bottom: 12px; color: #444; display: flex; align-items: center; }
    .info-row span { color: #999; margin-right: 8px; font-size: 13px; width: 45px; }
    
    #loading { text-align: center; padding-top: 50px; color: #999; font-size: 14px; }
    
    /* 訊息彈窗樣式 */
    #message-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center; }
    .message-box { background: #fff; padding: 24px; border-radius: 12px; width: 80%; max-width: 300px; text-align: center; }
    .message-text { font-size: 14px; color: #333; margin-bottom: 20px; line-height: 1.6; }
    .message-btn { background-color: #111; color: #fff; border: none; padding: 10px 20px; border-radius: 4px; width: 100%; }
  </style>
</head>
<body>
  <div id="loading">身分辨認中...</div>

  <!-- 1. 商家註冊區 -->
  <div id="section-onboarding" class="section">
    <span class="label">商家名稱</span>
    <input type="text" id="reg-name" placeholder="請填寫您的公司或品牌名稱">
    <p style="font-size: 13px; color: #999; margin-bottom: 24px;">點擊下方按鈕將抓取您的 LINE ID 進行授權綁定。</p>
    <button onclick="bindIdentity()">抓取並綁定我的 LINE</button>
  </div>

  <!-- 2. 審核狀態區 -->
  <div id="section-status" class="section" style="text-align:center; padding-top:80px;">
    <p id="status-text" style="color:#999; font-size:14px; line-height:1.8;"></p>
    <button class="btn-secondary" onclick="location.reload()">重新整理</button>
  </div>

  <!-- 3. 名片檢視區 -->
  <div id="section-view" class="section">
    <div class="header">
      <img id="view-avatar" class="avatar" src="data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=">
      <div class="name-area">
        <div id="view-name" class="name"></div>
        <div id="view-sub" class="sub"></div>
      </div>
    </div>
    <div class="info-row"><span>電話</span> <div id="view-phone"></div></div>
    <div class="info-row"><span>信箱</span> <div id="view-email"></div></div>
    
    <div style="margin-top: 40px;">
      <button onclick="sendMsg()">傳送名片至此聊天</button>
      <button class="btn-secondary" onclick="shareMsg()">分享名片給好友</button>
    </div>
    <button style="background:none; color:#00B900; margin-top:16px; font-size:14px; padding: 10px 0; border:none; width: 100%;" onclick="showSection('edit')">編輯名片資料</button>
  </div>

  <!-- 4. 名片編輯區 -->
  <div id="section-edit" class="section">
    <span class="label">姓名</span>
    <input type="text" id="edit-name" placeholder="您的姓名">
    <span class="label">職稱與公司</span>
    <input type="text" id="edit-title" placeholder="例如：總經理 / 康立全球">
    <span class="label">行動電話</span>
    <input type="tel" id="edit-phone" placeholder="09xx-xxx-xxx">
    <span class="label">電子郵件</span>
    <input type="email" id="edit-email" placeholder="example@mail.com">
    <span class="label">大頭貼網址 (可選)</span>
    <input type="url" id="edit-avatar" placeholder="https://...">
    
    <button onclick="saveCard()">儲存資料</button>
    <button class="btn-secondary" onclick="showSection('view')">返回</button>
  </div>

  <div id="message-overlay">
    <div class="message-box">
      <div id="message-content" class="message-text"></div>
      <button class="message-btn" onclick="closeMessage()">確認</button>
    </div>
  </div>

  <script>
    const API = 'https://ecbusiness.fangwl591021.workers.dev';
    let userId = '', tenantId = '', liffId = '', cardData = null;

    function showMessage(text) {
      document.getElementById('message-content').innerText = text;
      document.getElementById('message-overlay').style.display = 'flex';
    }
    function closeMessage() { document.getElementById('message-overlay').style.display = 'none'; }

    function showSection(id) {
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      document.getElementById('loading').style.display = 'none';
      const target = document.getElementById('section-' + id);
      if (target) target.classList.add('active');
    }

    function resolveParams() {
      const urlObj = new URL(window.location.href);
      let tId = urlObj.searchParams.get('tenantId');
      let lId = urlObj.searchParams.get('liffId');
      
      // 解析 liff.state 內的參數
      if (!tId || !lId) {
        const state = urlObj.searchParams.get('liff.state');
        if (state) {
          const sParams = new URLSearchParams(state.includes('?') ? state.split('?')[1] : '?' + state);
          tId = tId || sParams.get('tenantId');
          lId = lId || sParams.get('liffId');
        }
      }
      tenantId = tId; liffId = lId;
    }

    async function init() {
      resolveParams();
      if (!tenantId || !liffId) {
        document.getElementById('loading').innerText = '網址參數遺失。';
        return;
      }
      try {
        await liff.init({ liffId: liffId });
        if (!liff.isLoggedIn()) {
          liff.login({ redirectUri: window.location.href });
          return;
        }
        const profile = await liff.getProfile();
        userId = profile.userId;
        checkStatus();
      } catch (err) {
        document.getElementById('loading').innerText = 'LINE 認證初始化失敗。';
      }
    }

    async function checkStatus() {
      try {
        const res = await fetch(`${API}/?action=check_status&tenantId=${tenantId}`);
        const t = await res.json();
        if (t.status === 'pending') showSection('onboarding');
        else if (t.status === 'binding') {
          document.getElementById('status-text').innerText = '身分抓取成功！\n請通知總管核准開通帳號。';
          showSection('status');
        } else if (t.status === 'active') {
          loadCard();
        } else {
          document.getElementById('status-text').innerText = '此帳號已被停用。';
          showSection('status');
        }
      } catch (e) {
        document.getElementById('loading').innerText = '連線 API 失敗。';
      }
    }

    async function bindIdentity() {
      const name = document.getElementById('reg-name').value;
      if (!name) return alert('請填寫商家名稱');
      await fetch(`${API}/?action=tenant_bind&tenantId=${tenantId}`, {
        method: 'POST',
        body: JSON.stringify({ tenantName: name, userId: userId })
      });
      location.reload();
    }

    async function loadCard() {
      const res = await fetch(`${API}/?action=get&tenantId=${tenantId}&userId=${userId}`);
      cardData = await res.json();
      if (!cardData.name) {
        showSection('edit');
      } else {
        document.getElementById('view-name').innerText = cardData.name;
        document.getElementById('view-sub').innerText = cardData.title;
        document.getElementById('view-phone').innerText = cardData.phone || '未填寫';
        document.getElementById('view-email').innerText = cardData.email || '未填寫';
        if (cardData.avatar) document.getElementById('view-avatar').src = cardData.avatar;
        
        document.getElementById('edit-name').value = cardData.name;
        document.getElementById('edit-title').value = cardData.title;
        document.getElementById('edit-phone').value = cardData.phone;
        document.getElementById('edit-email').value = cardData.email;
        document.getElementById('edit-avatar').value = cardData.avatar;
        showSection('view');
      }
    }

    async function saveCard() {
      const name = document.getElementById('edit-name').value;
      if (!name) return alert('請填寫姓名');
      
      document.getElementById('loading').style.display = 'block';
      await fetch(`${API}/?action=save&tenantId=${tenantId}&userId=${userId}`, {
        method: 'POST',
        body: JSON.stringify({
          name: name,
          title: document.getElementById('edit-title').value,
          phone: document.getElementById('edit-phone').value,
          email: document.getElementById('edit-email').value,
          avatar: document.getElementById('edit-avatar').value,
          duration: 30
        })
      });
      loadCard();
    }

    function buildFlex() {
      const currentUrl = window.location.origin + window.location.pathname + window.location.search;
      return {
        type: "flex", altText: `${cardData.name} 的數位名片`,
        contents: {
          type: "bubble", size: "kilo",
          body: {
            type: "box", layout: "vertical", paddingAll: "0px", contents: [
              {
                type: "box", layout: "vertical", paddingAll: "20px", background: { type: "linearGradient", angle: "45deg", startColor: "#00B900", endColor: "#009900" }, contents: [
                  {
                    type: "box", layout: "horizontal", alignItems: "center", contents: [
                      { type: "image", url: cardData.avatar || "https://upload.wikimedia.org/wikipedia/commons/8/89/Portrait_Placeholder.png", size: "sm", aspectMode: "cover", aspectRatio: "1:1", flex: 0, cornerRadius: "100px" },
                      {
                        type: "box", layout: "vertical", margin: "lg", contents: [
                          { type: "text", text: cardData.name, size: "xl", color: "#ffffff" },
                          { type: "text", text: cardData.title || "專業人士", size: "xs", color: "#ffffffcc", margin: "xs", wrap: true }
                        ]
                      }
                    ]
                  }
                ]
              },
              {
                type: "box", layout: "vertical", paddingAll: "20px", spacing: "md", contents: [
                  {
                    type: "box", layout: "horizontal", contents: [
                      { type: "text", text: "Phone", size: "xs", color: "#aaaaaa", flex: 1 },
                      { type: "text", text: cardData.phone || "-", size: "xs", color: "#444444", flex: 4 }
                    ]
                  },
                  {
                    type: "box", layout: "horizontal", contents: [
                      { type: "text", text: "Email", size: "xs", color: "#aaaaaa", flex: 1 },
                      { type: "text", text: cardData.email || "-", size: "xs", color: "#444444", flex: 4, wrap: true }
                    ]
                  },
                  { type: "separator", margin: "lg" },
                  {
                    type: "button", action: { type: "uri", label: "查看詳情", uri: currentUrl }, height: "sm", style: "primary", color: "#00B900", margin: "lg"
                  }
                ]
              }
            ]
          }
        }
      };
    }

    async function sendMsg() {
      if (!liff.isInClient()) return showMessage("請在 LINE 內使用此功能。");
      try {
        await liff.sendMessages([buildFlex()]);
        liff.closeWindow();
      } catch (e) { showMessage("傳送失敗。"); }
    }

    async function shareMsg() {
      if (!liff.isApiAvailable('shareTargetPicker')) return showMessage("不支援分享功能。");
      try {
        const res = await liff.shareTargetPicker([buildFlex()]);
        if (res) liff.closeWindow();
      } catch (err) { showMessage("分享失敗或取消。"); }
    }

    init();
  </script>
</body>
</html>
