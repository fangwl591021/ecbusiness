<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>電子名片系統</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body { font-family: sans-serif; padding: 16px; color: #111111; margin: 0; background-color: #ffffff; }
    .section { display: none; }
    .active { display: block; }
    
    /* LINE OA 原生資訊流樣式 */
    .label { font-size: 13px; color: #999999; margin-bottom: 4px; display: block; }
    input { display: block; width: 100%; margin-bottom: 20px; padding: 10px 0; border: none; border-bottom: 1px solid #eeeeee; font-size: 15px; box-sizing: border-box; color: #111111; background: transparent; border-radius: 0; }
    input:focus { outline: none; border-bottom: 1px solid #00B900; }
    
    button { background-color: #00B900; color: #ffffff; border: none; padding: 12px; width: 100%; font-size: 15px; border-radius: 4px; cursor: pointer; transition: 0.2s; }
    .btn-secondary { background-color: #f5f5f5; color: #111111; margin-top: 10px; }
    
    .header { display: flex; align-items: center; margin-bottom: 20px; }
    .avatar { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; margin-right: 12px; background-color: #f8f8f8; }
    .name { font-size: 17px; margin-bottom: 2px; }
    .sub { font-size: 13px; color: #999999; }
    .info-row { font-size: 14px; margin-bottom: 10px; color: #333333; }
    
    #loading { text-align: center; padding-top: 40px; color: #999999; font-size: 14px; }
  </style>
</head>
<body>
  <div id="loading">身分辨認中...</div>

  <!-- 1. 商家註冊區 (status: pending) -->
  <div id="section-onboarding" class="section">
    <span class="label">商家名稱</span>
    <input type="text" id="reg-name" placeholder="請填寫您的公司或店家名稱">
    <p style="font-size: 13px; color: #999; margin-bottom: 20px;">點擊下方按鈕將抓取您的 LINE 身分進行授權綁定。</p>
    <button onclick="bindIdentity()">抓取並綁定我的 LINE</button>
  </div>

  <!-- 2. 等待開通區 (status: binding) -->
  <div id="section-status" class="section" style="text-align:center; padding-top:60px;">
    <p style="color:#999; font-size:14px;">身分抓取成功！<br>請聯繫管理員回填核准，開通您的服務。</p>
    <button class="btn-secondary" onclick="location.reload()">重新整理狀態</button>
  </div>

  <!-- 3. 名片功能區 (status: active) -->
  <div id="section-view" class="section">
    <div class="header">
      <img id="view-avatar" class="avatar" src="data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=">
      <div class="name-title">
        <div id="view-name" class="name"></div>
        <div id="view-sub" class="sub"></div>
      </div>
    </div>
    <div class="info-row" id="view-phone"></div>
    <div class="info-row" id="view-email"></div>
    <div style="display: flex; gap: 10px; margin-top: 30px;">
      <button onclick="sendMsg()">傳送名片</button>
      <button class="btn-secondary" onclick="shareMsg()">分享好友</button>
    </div>
    <button style="background:none; color:#00B900; margin-top:10px;" onclick="showSection('edit')">更新我的資料</button>
  </div>

  <!-- 4. 名片編輯區 -->
  <div id="section-edit" class="section">
    <span class="label">姓名</span>
    <input type="text" id="edit-name">
    <span class="label">職稱公司</span>
    <input type="text" id="edit-title">
    <span class="label">電話</span>
    <input type="tel" id="edit-phone">
    <span class="label">信箱</span>
    <input type="email" id="edit-email">
    <span class="label">頭像網址</span>
    <input type="url" id="edit-avatar">
    <button onclick="saveCard()">儲存資料</button>
  </div>

  <script>
    const API = 'https://ecbusiness.fangwl591021.workers.dev';
    let userId = '', tenantId = '', liffId = '', cardData = null;

    function showSection(id) {
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      document.getElementById('loading').style.display = 'none';
      document.getElementById('section-' + id).classList.add('active');
    }

    async function init() {
      const p = new URLSearchParams(window.location.search);
      tenantId = p.get('tenantId'); liffId = p.get('liffId');
      if (!tenantId || !liffId) { document.getElementById('loading').innerText = '網址參數錯誤'; return; }

      await liff.init({ liffId: liffId });
      if (!liff.isLoggedIn()) {
        liff.login({ redirectUri: window.location.href });
        return;
      }
      const profile = await liff.getProfile();
      userId = profile.userId;
      checkStatus();
    }

    async function checkStatus() {
      const res = await fetch(`${API}/?action=check_status&tenantId=${tenantId}`);
      const t = await res.json();
      if (t.status === 'pending') showSection('onboarding');
      else if (t.status === 'binding') showSection('status');
      else if (t.status === 'active') loadCard();
      else document.getElementById('loading').innerText = '帳號異常或已停用';
    }

    async function bindIdentity() {
      const name = document.getElementById('reg-name').value;
      if (!name) return alert('請填寫商家名稱');
      await fetch(`${API}/?action=tenant_bind&tenantId=${tenantId}`, {
        method: 'POST', body: JSON.stringify({ tenantName: name, userId: userId })
      });
      location.reload();
    }

    async function loadCard() {
      const res = await fetch(`${API}/?action=get&tenantId=${tenantId}&userId=${userId}`);
      cardData = await res.json();
      if (!cardData.name) showSection('edit');
      else {
        document.getElementById('view-name').innerText = cardData.name;
        document.getElementById('view-sub').innerText = cardData.title;
        document.getElementById('view-phone').innerText = 'Mobile: ' + cardData.phone;
        document.getElementById('view-email').innerText = 'Email: ' + cardData.email;
        if (cardData.avatar) document.getElementById('view-avatar').src = cardData.avatar;
        
        document.getElementById('edit-name').value = cardData.name;
        document.getElementById('edit-title').value = cardData.title;
        document.getElementById('edit-phone').value = cardData.phone;
        document.getElementById('edit-email').value = cardData.email;
        document.getElementById('edit-avatar').value = cardData.avatar;
        showSection('view');
      }
    }

    async function saveCard() {
      const name = document.getElementById('edit-name').value;
      if (!name) return alert('請填寫姓名');
      await fetch(`${API}/?action=save&tenantId=${tenantId}&userId=${userId}`, {
        method: 'POST', body: JSON.stringify({
          name, title: document.getElementById('edit-title').value,
          phone: document.getElementById('edit-phone').value,
          email: document.getElementById('edit-email').value,
          avatar: document.getElementById('edit-avatar').value,
          duration: 30
        })
      });
      loadCard();
    }

    function buildFlex() {
      return { type: "flex", altText: `${cardData.name} 的名片`, contents: { type: "bubble", size: "kilo", body: { type: "box", layout: "vertical", contents: [ { type: "box", layout: "horizontal", contents: [ { type: "image", url: cardData.avatar || "https://upload.wikimedia.org/wikipedia/commons/8/89/Portrait_Placeholder.png", size: "sm", aspectMode: "cover", aspectRatio: "1:1", flex: 1 }, { type: "box", layout: "vertical", contents: [ { type: "text", text: cardData.name, size: "md", color: "#111111" }, { type: "text", text: cardData.title, size: "sm", color: "#999999", margin: "xs" } ], flex: 3, margin: "md", justifyContent: "center" } ] }, { type: "text", text: `Mobile: ${cardData.phone}`, size: "sm", color: "#333333", margin: "md" }, { type: "text", text: `Email: ${cardData.email}`, size: "sm", color: "#333333", margin: "xs" } ], paddingAll: "md" } } };
    }
    async function sendMsg() { await liff.sendMessages([buildFlex()]); liff.closeWindow(); }
    async function shareMsg() { await liff.shareTargetPicker([buildFlex()]); liff.closeWindow(); }

    init();
  </script>
</body>
</html>
