<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>電子名片系統</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body { font-family: sans-serif; padding: 16px; color: #111111; margin: 0; background-color: #ffffff; }
    .section { display: none; }
    .active { display: block; }
    
    /* 原生資訊流樣式：無框線、灰字標題、不加粗 */
    .label { font-size: 13px; color: #999999; margin-bottom: 4px; display: block; }
    input { display: block; width: 100%; margin-bottom: 24px; padding: 10px 0; border: none; border-bottom: 1px solid #eeeeee; font-size: 15px; color: #111111; background: transparent; border-radius: 0; }
    input:focus { outline: none; border-bottom: 1px solid #00B900; }
    
    button { background-color: #00B900; color: #ffffff; border: none; padding: 12px; width: 100%; font-size: 15px; border-radius: 4px; cursor: pointer; }
    .btn-secondary { background-color: #f5f5f5; color: #111111; margin-top: 10px; }
    
    .header { display: flex; align-items: center; margin-bottom: 20px; }
    .avatar { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; margin-right: 12px; background-color: #f8f8f8; }
    .name { font-size: 17px; margin-bottom: 2px; }
    .sub { font-size: 13px; color: #999999; }
    
    #loading { text-align: center; padding-top: 40px; color: #999; font-size: 14px; }
    
    /* 除錯輸入框樣式 */
    #debug-input { padding: 20px; border: 1px dashed #ccc; margin-top: 20px; border-radius: 8px; background: #fafafa; }
  </style>
</head>
<body>
  <div id="loading">身分辨認中...</div>

  <!-- 參數遺失補救區 (僅在 blob 或無參數網址出現) -->
  <div id="section-debug" class="section">
    <div id="debug-input">
      <p style="font-size:14px; color:#666;">偵測到預覽環境參數遺失，請手動輸入：</p>
      <span class="label">商家代號 (tenantId)</span>
      <input type="text" id="manual-tenant" placeholder="例如: L-LINK">
      <span class="label">LIFF ID</span>
      <input type="text" id="manual-liff" value="2009930620-98JTuN5O">
      <button onclick="manualStart()">確認並開始測試</button>
    </div>
  </div>

  <!-- 1. 商家註冊與身分綁定介面 -->
  <div id="section-onboarding" class="section">
    <span class="label">商家名稱</span>
    <input type="text" id="reg-name" placeholder="請填寫名稱">
    <button onclick="bindIdentity()">抓取並綁定我的 LINE</button>
  </div>

  <!-- 2. 等待審核介面 -->
  <div id="section-status" class="section" style="text-align:center; padding-top:60px;">
    <p style="color:#999; font-size:14px;">身分抓取成功！<br>請通知管理員回填核准，開通您的服務。</p>
    <button class="btn-secondary" onclick="location.reload()">重新整理狀態</button>
  </div>

  <!-- 3. 名片功能介面 -->
  <div id="section-view" class="section">
    <div class="header">
      <img id="view-avatar" class="avatar" src="data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=">
      <div>
        <div id="view-name" class="name"></div>
        <div id="view-sub" class="sub"></div>
      </div>
    </div>
    <div style="display: flex; gap: 10px; margin-top: 30px;">
      <button onclick="sendMsg()">傳送名片</button>
    </div>
    <button style="background:none; color:#00B900; margin-top:10px" onclick="showSection('edit')">編輯名片資料</button>
  </div>

  <!-- 4. 名片編輯介面 -->
  <div id="section-edit" class="section">
    <span class="label">姓名</span>
    <input type="text" id="edit-name">
    <span class="label">職稱公司</span>
    <input type="text" id="edit-title">
    <span class="label">行動電話</span>
    <input type="tel" id="edit-phone">
    <button onclick="saveCard()">儲存資料</button>
  </div>

  <script>
    const API = 'https://ecbusiness.fangwl591021.workers.dev';
    let userId = '', tenantId = '', liffId = '', cardData = null;

    function showSection(id) {
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      document.getElementById('loading').style.display = 'none';
      const target = document.getElementById('section-' + id);
      if (target) target.classList.add('active');
    }

    /**
     * 解析 URL 參數：支援多種跳轉後的參數恢復
     */
    function resolveParams() {
      const urlObj = new URL(window.location.href);
      let tId = urlObj.searchParams.get('tenantId');
      let lId = urlObj.searchParams.get('liffId');

      if (!tId || !lId) {
        const hash = window.location.hash;
        if (hash.includes('?')) {
          const hashParams = new URLSearchParams(hash.split('?')[1]);
          tId = tId || hashParams.get('tenantId');
          lId = lId || hashParams.get('liffId');
        }
      }

      if (!tId || !lId) {
        const state = urlObj.searchParams.get('liff.state') || 
                      (window.location.hash.includes('liff.state') ? new URLSearchParams(window.location.hash.split('?')[1] || window.location.hash.replace('#','?')).get('liff.state') : null);
        if (state) {
          try {
            const decodedState = decodeURIComponent(state);
            const stateParams = new URLSearchParams(decodedState.includes('?') ? decodedState.split('?')[1] : decodedState);
            tId = tId || stateParams.get('tenantId');
            lId = lId || stateParams.get('liffId');
          } catch(e) {}
        }
      }

      tenantId = tId;
      liffId = lId;
    }

    async function init() {
      resolveParams();

      // 如果解析後還是 null，則顯示手動輸入介面 (針對 blob 網址預覽環境)
      if (!tenantId || !liffId) {
        showSection('debug');
        console.warn("偵測到參數丟失，已開啟手動補救模式。");
        return;
      }

      try {
        await liff.init({ liffId: liffId });
        if (!liff.isLoggedIn()) {
          liff.login({ redirectUri: window.location.href });
          return;
        }
        const profile = await liff.getProfile();
        userId = profile.userId;
        checkStatus();
      } catch (err) {
        document.getElementById('loading').innerText = 'LINE 認證初始化失敗。';
      }
    }

    /**
     * 手動開始測試 (針對開發環境)
     */
    function manualStart() {
      tenantId = document.getElementById('manual-tenant').value.trim();
      liffId = document.getElementById('manual-liff').value.trim();
      if(!tenantId || !liffId) return alert("請完整填寫參數");
      
      document.getElementById('section-debug').classList.remove('active');
      document.getElementById('loading').style.display = 'block';
      init();
    }

    async function checkStatus() {
      const res = await fetch(`${API}/?action=check_status&tenantId=${tenantId}`);
      const t = await res.json();
      if (t.status === 'pending') showSection('onboarding');
      else if (t.status === 'binding') showSection('status');
      else if (t.status === 'active') loadCard();
      else document.getElementById('loading').innerText = '帳號異常或已停用';
    }

    async function bindIdentity() {
      const name = document.getElementById('reg-name').value;
      if (!name) return alert('請填寫商家名稱');
      await fetch(`${API}/?action=tenant_bind&tenantId=${tenantId}`, {
        method: 'POST',
        body: JSON.stringify({ tenantName: name, userId: userId })
      });
      location.reload();
    }

    async function loadCard() {
      const res = await fetch(`${API}/?action=get&tenantId=${tenantId}&userId=${userId}`);
      cardData = await res.json();
      if (!cardData.name) {
        showSection('edit');
      } else {
        document.getElementById('view-name').innerText = cardData.name;
        document.getElementById('view-sub').innerText = cardData.title;
        showSection('view');
      }
    }

    async function saveCard() {
      const name = document.getElementById('edit-name').value;
      if (!name) return alert('請填寫姓名');
      await fetch(`${API}/?action=save&tenantId=${tenantId}&userId=${userId}`, {
        method: 'POST',
        body: JSON.stringify({
          name: name,
          title: document.getElementById('edit-title').value,
          phone: document.getElementById('edit-phone').value,
          duration: 30
        })
      });
      loadCard();
    }

    async function sendMsg() {
      try {
        await liff.sendMessages([{
          type: "flex", altText: "數位名片",
          contents: { 
            type: "bubble", 
            body: { 
              type: "box", 
              layout: "vertical", 
              contents: [{ type: "text", text: cardData.name, weight: "bold", size: "xl" }] 
            } 
          }
        }]);
        liff.closeWindow();
      } catch (e) {}
    }

    init();
  </script>
</body>
</html>
